version: "3.1"

stories:
  - story: happy path - Laura (everyday laptop)
    steps:
      - intent: greet
      - action: utter_greet
      - intent: laptop_search
      - action: laptop_recommendation_form
      - active_loop: laptop_recommendation_form
      - intent: inform_budget
        entities:
          - budget: "800"
      - slot_was_set:
          - budget: "800"
      - intent: inform_use_case
        entities:
          - use_case: "university"
      - slot_was_set:
          - use_case: "university"
      - intent: inform_portability
      - slot_was_set:
          - portability: "yes"
      - intent: inform_gaming
      - slot_was_set:
          - gaming: "no"
      - active_loop: null
      - action: action_recommend_laptop
      - intent: affirm
      - action: utter_goodbye

  - story: happy path - Maca (gaming laptop)
    steps:
      - intent: greet
      - action: utter_greet
      - intent: laptop_search
      - action: laptop_recommendation_form
      - active_loop: laptop_recommendation_form
      - intent: inform_budget
        entities:
          - budget: "900"
      - slot_was_set:
          - budget: "900"
      - intent: inform_use_case
        entities:
          - use_case: "gaming"
      - slot_was_set:
          - use_case: "gaming"
      - intent: inform_portability
      - slot_was_set:
          - portability: "yes"
      - intent: inform_gaming
      - slot_was_set:
          - gaming: "yes"
      - active_loop: null
      - action: action_recommend_laptop
      - intent: deny
      - action: utter_deny_recommendation
      - action: utter_affirm_alternatives
      - intent: goodbye
      - action: utter_goodbye

  - story: user asks free question mid-conversation
    steps:
      - intent: greet
      - action: utter_greet
      - intent: laptop_search
      - action: laptop_recommendation_form
      - active_loop: laptop_recommendation_form
      - intent: inform_budget
        entities:
          - budget: "800"
      - slot_was_set:
          - budget: "800"
      - intent: ask_freeform
      - active_loop: null
      - action: action_call_langgraph

  - story: user asks comparison
    steps:
      - intent: ask_comparison
      - action: action_call_langgraph

  - story: user asks guarantee question
    steps:
      - intent: ask_guarantee
      - action: action_call_langgraph

  - story: goodbye at any point
    steps:
      - intent: goodbye
      - action: utter_goodbye

  - story: user out of scope
