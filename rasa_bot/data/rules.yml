version: "3.1"

rules:
  - rule: Greet user
    steps:
      - intent: greet
      - action: utter_greet

  - rule: Say goodbye
    steps:
      - intent: goodbye
      - action: utter_goodbye

  - rule: Activate laptop recommendation form
    steps:
      - intent: laptop_search
      - action: laptop_recommendation_form
      - active_loop: laptop_recommendation_form

  - rule: Submit laptop recommendation form
    condition:
      - active_loop: laptop_recommendation_form
    steps:
      - action: laptop_recommendation_form
      - active_loop: null
      - slot_was_set:
          - requested_slot: null
      - action: action_recommend_laptop

  - rule: Handle out of scope
    steps:
      - intent: out_of_scope
      - action: utter_out_of_scope

  - rule: Handle free-form question with LangGraph
    steps:
      - intent: ask_freeform
      - action: action_call_langgraph

  - rule: Handle comparison question with LangGraph
    steps:
      - intent: ask_comparison
      - action: action_call_langgraph

  - rule: Handle guarantee question with LangGraph
    steps:
      - intent: ask_guarantee
      - action: action_call_langgraph

  - rule: Fallback to LangGraph
    steps:
      - intent: nlu_fallback
      - action: action_call_langgraph
